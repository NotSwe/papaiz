name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: "1. Checkout Repository"
        uses: actions/checkout@v4

      - name: "2. Setup Environment"
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: "3. Create Admin User"
        run: |
          $pass = ConvertTo-SecureString "ServerKuat99@!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $pass
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: "4. Cache Node Modules"
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "5. Install Dependencies (Natif / Tanpa VPN)"
        run: |
          if (Test-Path "node_modules") {
              Write-Host "Folder node_modules ditemukan dari Cache! Skip npm install."
          } else {
              Write-Host "Folder node_modules tidak ditemukan! Menjalankan npm install..."
              npm install
          }

      - name: "6. Setup Cloudflare WARP VPN"
        run: |
          Write-Host "Mengunduh installer Cloudflare WARP..."
          $warpUrl = "https://1111-releases.cloudflareclient.com/windows/Cloudflare_WARP_Release-x64.msi"
          Invoke-WebRequest -Uri $warpUrl -OutFile "$env:TEMP\warp.msi"
          
          Write-Host "Menginstal Cloudflare WARP secara senyap..."
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\warp.msi`" /quiet /norestart" -Wait
          Start-Sleep -Seconds 15
          
          Write-Host "Meregistrasi dan Menghubungkan ke WARP..."
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos registration new
          & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos connect
          Start-Sleep -Seconds 10
          
          $warpStatus = & "C:\Program Files\Cloudflare\Cloudflare WARP\warp-cli.exe" --accept-tos status
          Write-Host "==============================="
          Write-Host "Status WARP: $warpStatus"
          Write-Host "==============================="

      - name: "7. Setup Tailscale"
        run: |
          $tsUrl = "https://dl.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\tailscale.msi`"", "/quiet", "/norestart" -Wait
          Start-Sleep -Seconds 15
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=windows-rdp --accept-dns=false
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "==============================="
          Write-Host "IP RDP (Tailscale): $tsIP"
          Write-Host "==============================="

      - name: "8. Run Bot with Auto-Restart"
        run: |
          # npm install sudah dilakukan di Step 5, di sini tinggal jalankan bot-nya saja
          $script = @"
          while(`$true) {
              Write-Host "Menjalankan Bot..."
              npm start
              Write-Host "Bot crash, restart dalam 5 detik..."
              Start-Sleep -Seconds 5
          }
          "@
          $script | Out-File -FilePath "start_bot.ps1"
          Start-Process powershell -ArgumentList "-ExecutionPolicy Bypass -File start_bot.ps1" -WindowStyle Normal

      - name: "9. Keep Alive (Durasi 5 Jam)"
        run: |
          Write-Host "Server berjalan... Menunggu 5 jam sebelum auto-backup."
          Start-Sleep -Seconds 18000

      - name: "10. Auto-Backup Semua Perubahan File"
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          $changes = git status --porcelain
          if ($changes) {
              Write-Host "Ditemukan perubahan file. Melakukan commit..."
              git commit -m "Auto-backup data bot [skip ci]"
              git push origin HEAD:main
          } else {
              Write-Host "Tidak ada perubahan file."
          }

      - name: "11. Auto-Up (Trigger Siklus Berikutnya)"
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run "main.yml" --ref main
